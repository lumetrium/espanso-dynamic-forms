schema:
  type: object
  properties:
    type:
      type: string
      enum:
        - message
        - email
        - post
        - comment
        - review
    content:
      type: string
      default: "{{clipboard}}"
    draft:
      type: string
    styleGuidelines:
      type: array
      items:
        type: string
        enum:
          - Use a conversational, slightly informal style with simple language
          - Use contractions like "you're" and "don't"
          - Prioritize clarity with simple sentence structure
          - Use a professional and formal tone
          - Use a friendly and approachable style
          - Use active voice instead of passive
          - Match the original sender's formality level
      uniqueItems: true
    customGuidelines:
      type: array
      items:
        type: string
    context:
      type: string
    convo:
      type: string
  required:
    - type
    - content

uischema:
  type: Categorization
  elements:
    - type: Category
      label: Content
      elements:
        - type: VerticalLayout
          elements:
            - type: Control
              scope: "#/properties/type"
              label: Help me reply to this
              options:
                format: radio
                vuetify:
                  v-radio-group:
                    inline: true
                    hideDetails: true
            - type: Control
              scope: "#/properties/content"
              options:
                multi: true
            - type: Control
              scope: "#/properties/draft"
              label: My draft response
              options:
                multi: true
                vuetify:
                  v-textarea:
                    rows: 10
            - type: Control
              scope: "#/properties/context"
              label: Additional context
              options:
                multi: true
    - type: Category
      label: Style
      elements:
        - type: VerticalLayout
          elements:
            - type: Control
              scope: "#/properties/styleGuidelines"
              label: Style guidelines
              options:
                format: checkbox
                vuetify:
                  v-input:
                    class: vertical
            - type: Control
              scope: "#/properties/customGuidelines"
              label: Custom guidelines
    - type: Category
      label: Convo
      elements:
        - type: VerticalLayout
          elements:
            - type: Control
              scope: "#/properties/convo"
              label: Entire conversation (if applicable)

data:
  type: message
  content: "{{clipboard}}"
  styleGuidelines:
    - Use a conversational, slightly informal style with simple language
    - Use contractions like "you're" and "don't"
    - Prioritize clarity with simple sentence structure
  customGuidelines:
    - ""

template: |
  Help me reply to this {{type}}:
  ```
  {{content}}
  ```
  {% if draft %}
  My draft response:
  ```
  {{draft}}
  ```
  {% endif %}
  {% assign allGuidelines = styleGuidelines | concat: customGuidelines %}
  {% assign filteredGuidelines = allGuidelines | where_exp: "item", "item != ''" %}
  {% if filteredGuidelines.size > 0 %}
  Style guidelines:
  - {{filteredGuidelines | join: '\n- '}}
  {% endif %}
  {% if convo %}
  Here is the entire conversation for context:
  ```
  {{convo}}
  ```
  {% endif %}
  {% if context %}
  Additional context:
  ```
  {{context}}
  ```
  {% endif %}
